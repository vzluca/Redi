<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Redi — Panel de RedLabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Tomorrow:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS (sistema de marca RedLabs) ============ */
:root{
  /* dark = primario. Ink como fondo, Warm White como texto, Red como acento. */
  --bg:#050403; --bg-2:#0B0A09; --surface:#111110; --surface-2:#1A1917; --surface-3:#232120;
  --border:#242220; --border-2:#312E2C;
  --text:#F7F5F2; --muted:#A8A29B; --faint:#6E6862;
  --accent:#EE2B24; --accent-hover:#FF3A32; --accent-soft:rgba(238,43,36,.13); --accent-ink:#F7F5F2;
  --good:#46C05A; --good-soft:rgba(70,192,90,.14);
  --warn:#E6B23C; --warn-soft:rgba(230,178,60,.14);
  --info:#5A93FF; --info-soft:rgba(90,147,255,.14);
  --shadow:0 1px 2px rgba(0,0,0,.5), 0 12px 30px rgba(0,0,0,.36);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --radius:5px; --radius-sm:3px;
  --sans:"Instrument Sans",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --num:"Tomorrow",var(--sans);
  --mono:ui-monospace,"SF Mono",Menlo,"DejaVu Sans Mono",Consolas,monospace;
}
:root[data-theme="light"]{
  --bg:#F7F5F2; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#F1EEE9; --surface-3:#E9E5DF;
  --border:#E6E1DA; --border-2:#D8D2C9;
  --text:#050403; --muted:#5C5751; --faint:#8A847D;
  --accent:#D8241E; --accent-hover:#B71C17; --accent-soft:rgba(216,36,30,.10); --accent-ink:#FFFFFF;
  --good:#1E874B; --good-soft:rgba(30,135,75,.10);
  --warn:#9C7414; --warn-soft:rgba(156,116,20,.12);
  --info:#2E6DE0; --info-soft:rgba(46,109,224,.10);
  --shadow:0 1px 2px rgba(5,4,3,.06), 0 12px 28px rgba(5,4,3,.07);
  --shadow-sm:0 1px 2px rgba(5,4,3,.06);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--text); font-family:var(--sans);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
::selection{background:var(--accent); color:#fff}
/* números en Tomorrow */
.tnum{font-family:var(--num); font-variant-numeric:tabular-nums; letter-spacing:.01em}
/* labels / metadata en monospace */
.mono{font-family:var(--mono)}

/* ============ APP SHELL ============ */
.app{display:grid; grid-template-columns:240px 1fr; min-height:100vh}

/* ---- Sidebar ---- */
.side{background:var(--bg-2); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; box-shadow:var(--shadow-sm)}
.brand{display:flex; align-items:center; gap:12px; padding:22px 20px 20px}
.brand .mark{width:30px; height:30px; flex:none; display:block}
.brand .mark svg{width:100%; height:100%; display:block}
.brand .wm{font-weight:700; letter-spacing:-.02em; font-size:17px; line-height:1}
.brand .sub{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--faint); margin-top:5px}
.nav{padding:6px 12px; display:flex; flex-direction:column; gap:1px; overflow-y:auto}
.nav .lbl{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--faint); padding:16px 8px 7px}
.nav a{
  display:flex; align-items:center; gap:11px; padding:9px 10px 9px 20px; border-radius:var(--radius-sm);
  color:var(--muted); font-weight:500; font-size:13.5px; cursor:pointer; position:relative;
}
.nav a:hover{background:var(--surface-2); color:var(--text)}
.nav a.active{background:var(--surface-2); color:var(--text)}
.nav a.active::before{content:"<"; position:absolute; left:6px; font-family:var(--mono); font-weight:700; color:var(--accent); font-size:13px}
.nav a svg{width:17px; height:17px; flex:none; opacity:.85}
.nav a.active svg{opacity:1}
.nav .badge{margin-left:auto; background:var(--accent); color:#fff; font-family:var(--num); font-size:10.5px; font-weight:600; min-width:18px; height:18px; padding:0 5px; border-radius:2px; display:grid; place-items:center}
.side .foot{margin-top:auto; padding:16px; display:flex; align-items:center; gap:10px; box-shadow:0 -1px 0 var(--border)}
.side .foot .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px var(--good-soft)}
.side .foot small{font-family:var(--mono); color:var(--faint); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em}

/* ---- Main ---- */
.main{display:flex; flex-direction:column; min-width:0}
.topbar{display:flex; align-items:center; gap:16px; padding:16px 28px; position:sticky; top:0; z-index:5;
  background:color-mix(in srgb,var(--bg) 86%,transparent); backdrop-filter:blur(10px); box-shadow:0 1px 0 var(--border)}
.topbar h1{font-size:20px; font-weight:650; letter-spacing:-.02em; margin:0; text-wrap:balance}
.topbar .crumb{font-family:var(--mono); color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.06em; margin-top:3px}
.topbar .spacer{flex:1}
.iconbtn{width:36px; height:36px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--muted); display:grid; place-items:center; cursor:pointer; border:0}
.iconbtn:hover{color:var(--text); background:var(--surface-3)}
.iconbtn svg{width:17px;height:17px}
.content{padding:26px 28px 60px; max-width:1200px; width:100%}

/* ============ PRIMITIVES ============ */
.card{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow)}
.card.pad{padding:18px}
.row{display:flex; gap:16px; flex-wrap:wrap}
.section-title{font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--faint); font-weight:600; margin:0 0 14px}
.btn{
  display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:0;
  background:var(--surface-3); color:var(--text); border:0; cursor:pointer;
  font-family:var(--mono); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.05em;
  clip-path:polygon(8px 0, 100% 0, 100% 100%, 0 100%, 0 8px);
}
.btn:hover{background:var(--border-2)}
.btn svg{width:14px;height:14px}
.btn.primary{background:var(--accent); color:var(--accent-ink)}
.btn.primary:hover{background:var(--accent-hover)}
.btn.ghost{background:transparent; box-shadow:inset 0 0 0 1px var(--border-2)}
.btn.ghost:hover{box-shadow:inset 0 0 0 1px var(--faint)}
.btn.sm{padding:6px 10px; font-size:10.5px; clip-path:polygon(6px 0, 100% 0, 100% 100%, 0 100%, 0 6px)}

.chip{display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border-radius:2px; font-family:var(--mono);
  font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.chip.good{background:var(--good-soft); color:var(--good)}
.chip.warn{background:var(--warn-soft); color:var(--warn)}
.chip.crit{background:var(--accent-soft); color:var(--accent)}
.chip.info{background:var(--info-soft); color:var(--info)}
.chip.mute{background:var(--surface-2); color:var(--muted)}

.kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:16px}
.kpi{padding:17px 18px}
.kpi .k-top{display:flex; align-items:center; justify-content:space-between}
.kpi .k-top span:first-child{font-family:var(--mono); color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.07em}
.kpi .k-ico{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--surface-2);display:grid;place-items:center;color:var(--muted)}
.kpi .k-ico svg{width:16px;height:16px}
.kpi .k-val{font-family:var(--num); font-size:30px; font-weight:600; letter-spacing:-.01em; margin:14px 0 5px; line-height:1}
.kpi .k-sub{font-family:var(--mono); font-size:10.5px; color:var(--faint); text-transform:uppercase; letter-spacing:.03em}
.kpi .k-sub b{color:var(--good); font-weight:600}
.kpi .k-sub b.dn{color:var(--accent)}

.list{display:flex; flex-direction:column}
.list .it{display:flex; align-items:center; gap:12px; padding:12px 4px; box-shadow:0 -1px 0 var(--border)}
.list .it:first-child{box-shadow:none}
.avatar{width:34px;height:34px;border-radius:var(--radius-sm);flex:none;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:12px;color:#fff}
.avatar.wa{background:#1f7a52}.avatar.ig{background:#a12a6d}.avatar.em{background:#3a5bbf}
.meta{min-width:0;flex:1}
.meta .nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .ms{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .tm{font-family:var(--mono);color:var(--faint);font-size:10.5px}

table{width:100%; border-collapse:collapse; font-size:13px}
.twrap{overflow-x:auto}
th{text-align:left; font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); font-weight:600; padding:14px 14px 11px; white-space:nowrap}
td{padding:13px 14px; box-shadow:0 -1px 0 var(--border); white-space:nowrap}
tbody tr:hover{background:var(--surface-2)}
td .who{font-weight:600}
td .sm2{color:var(--muted); font-size:12px}

.channel{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
.channel svg{width:14px;height:14px}

/* charts (planos, sin degradado) */
.bars{display:flex; align-items:flex-end; gap:14px; height:150px; padding-top:8px}
.bars .b{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end}
.bars .b .bar{width:100%; max-width:36px; background:var(--accent); border-radius:2px 2px 0 0}
.bars .b .bl{font-family:var(--mono); font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:.04em}
.bars .b .bv{font-family:var(--num); font-size:12px; color:var(--muted); font-weight:600}
.pbar{height:6px;background:var(--surface-2);border-radius:2px;overflow:hidden}
.pbar>span{display:block;height:100%;background:var(--accent)}

/* inbox */
.inbox{display:grid; grid-template-columns:324px 1fr; gap:16px; align-items:start}
.conv-list .it{cursor:pointer; padding:11px 12px; border-radius:var(--radius-sm); box-shadow:none; margin-bottom:1px}
.conv-list .it:hover{background:var(--surface-2)}
.conv-list .it.sel{background:var(--surface-2)}
.conv-list .it.sel::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:2px;background:var(--accent)}
.conv-list .it{position:relative}
.thread{display:flex; flex-direction:column; min-height:520px}
.thread .th-head{display:flex; align-items:center; gap:12px; padding:16px 18px; box-shadow:0 1px 0 var(--border)}
.thread .th-body{flex:1; padding:20px 18px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; max-height:440px}
.bub{max-width:76%; padding:10px 13px; border-radius:var(--radius); font-size:13.5px; line-height:1.45}
.bub.in{align-self:flex-start; background:var(--surface-2); border-radius:var(--radius) var(--radius) var(--radius) 3px}
.bub.out{align-self:flex-end; background:var(--accent); color:var(--accent-ink); border-radius:var(--radius) var(--radius) 3px var(--radius)}
.bub .bt{display:block; font-family:var(--mono); font-size:9.5px; opacity:.7; margin-top:5px}
.thread .th-foot{box-shadow:0 -1px 0 var(--border); padding:12px 14px; display:flex; gap:10px; align-items:center}
.inp{flex:1; background:var(--surface-2); color:var(--text); border:0; border-radius:var(--radius-sm); padding:10px 13px; font-size:13.5px; font-family:inherit}
.inp:focus{outline:none; box-shadow:inset 0 0 0 1px var(--accent)}

.two{display:grid; grid-template-columns:1fr 340px; gap:16px; align-items:start}
.mini-it{display:flex; gap:11px; padding:11px 0; box-shadow:0 -1px 0 var(--border)}
.mini-it:first-child{box-shadow:none}
.mini-it .mi-ico{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--surface-2);display:grid;place-items:center;color:var(--muted);flex:none}
.mini-it .mi-ico svg{width:15px;height:15px}
.mini-it .mt{font-size:13px;font-weight:550}
.mini-it .md{font-size:12px;color:var(--muted)}

/* chat con redi */
.redi-chat{display:flex; flex-direction:column; min-height:560px}
.redi-chat .rc-body{flex:1; padding:22px; display:flex; flex-direction:column; gap:14px; max-height:480px; overflow-y:auto}
.redi-msg{display:flex; gap:11px; max-width:82%}
.redi-msg .ra{width:30px;height:30px;flex:none;display:block}
.redi-msg .ra svg{width:100%;height:100%}
.redi-msg .rb{background:var(--surface-2); padding:11px 14px; border-radius:var(--radius) var(--radius) var(--radius) 3px; font-size:13.5px}
.redi-msg.me{align-self:flex-end; flex-direction:row-reverse}
.redi-msg.me .rb{background:var(--accent); color:var(--accent-ink); border-radius:var(--radius) var(--radius) 3px var(--radius)}
.redi-chat .rc-foot{box-shadow:0 -1px 0 var(--border); padding:14px; display:flex; gap:10px}
.suggest{display:flex; gap:8px; flex-wrap:wrap; padding:0 22px 4px}
.suggest .s{font-family:var(--mono); font-size:11px; color:var(--muted); background:var(--surface-2); padding:6px 11px; border-radius:2px; cursor:pointer; text-transform:uppercase; letter-spacing:.03em}
.suggest .s:hover{color:var(--text); background:var(--surface-3)}

.def{display:grid; grid-template-columns:170px 1fr; gap:0 18px; align-items:center}
.def .dk{font-family:var(--mono); color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:10px 0; box-shadow:0 -1px 0 var(--border)}
.def .dv{padding:10px 0; box-shadow:0 -1px 0 var(--border); font-size:13px}
.def>.dk:first-of-type,.def>.dv:first-of-type{box-shadow:none}

.note{font-size:12.5px; color:var(--muted); background:var(--info-soft); border-radius:var(--radius-sm); padding:12px 14px; display:flex; gap:10px; align-items:flex-start}
.note svg{width:16px;height:16px;color:var(--info);flex:none;margin-top:1px}
.note b{color:var(--text); font-weight:600}

.hidden{display:none !important}
.menu-btn{display:none}
@media (max-width:920px){
  .app{grid-template-columns:1fr}
  .side{position:fixed; z-index:40; width:240px; transform:translateX(-100%); transition:transform .2s}
  .side.open{transform:none}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .inbox,.two{grid-template-columns:1fr}
  .content{padding:18px}
  .menu-btn{display:grid !important}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <!-- ================= SIDEBAR ================= -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 112 110" fill="var(--accent)"><path d="M14 6 H42 V104 H14 Z"/><path d="M46 6 H66 L100 55 L66 104 H46 L76 55 Z"/></svg>
      </div>
      <div>
        <div class="wm">Redi</div>
        <div class="sub">Cerebro de RedLabs</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">
      <span class="dot"></span>
      <small>Redi activo</small>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <div class="main">
    <header class="topbar">
      <button class="iconbtn menu-btn" onclick="document.getElementById('side').classList.toggle('open')" aria-label="Menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div>
        <h1 id="pageTitle">Resumen</h1>
        <div class="crumb" id="pageCrumb">Panel de control</div>
      </div>
      <div class="spacer"></div>
      <button class="btn ghost sm" id="periodBtn">Últimos 7 días</button>
      <button class="iconbtn" id="themeBtn" aria-label="Cambiar tema">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      </button>
    </header>
    <main class="content" id="view"></main>
  </div>
</div>

<script>

    {nombre:'Kiosco 24hs Núñez', contacto:'+54 9 351 555 0177', canal:'wa', quiere:'Registro de gastos', servicios:'Registro de Gastos WPP', total:280, modelo:'Compra', pago:'total', pagado:280, saldo:0, entrega:'Entregado', estado:'Cerrado'},

function renderNav(active){
  const groups={0:'Operación',1:'Clientes',2:'Inteligencia'};
  let html=''; let lastG=-1;
  ROUTES.forEach(r=>{
    if(r.group!==lastG){ html+=`<div class="lbl">${groups[r.group]}</div>`; lastG=r.group; }
    html+=`<a data-id="${r.id}" class="${r.id===active?'active':''}">${svg(r.icon)}<span>${r.label}</span>${r.badge?`<span class="badge">${r.badge}</span>`:''}</a>`;
  });
  const nav=document.getElementById('nav'); nav.innerHTML=html;
  nav.querySelectorAll('a').forEach(a=>a.onclick=()=>go(a.dataset.id));
}
function go(id){
  location.hash=id; renderNav(id);
  const [t,c]=TITLES[id]||['',''];
  document.getElementById('pageTitle').textContent=t;
  document.getElementById('pageCrumb').textContent=c;
  document.getElementById('periodBtn').style.display = (id==='resumen'||id==='reporte')?'':'none';
  document.getElementById('side').classList.remove('open');
  VIEWS[id]();
}

        <button class="btn primary" id="rcSend">${svg(I.send)} Enviar</button>
      </div>
    </div>`;
    const body=document.getElementById('rcBody'); body.scrollTop=body.scrollHeight;
    const inp=document.getElementById('rcInp');
    const ask=async(text)=>{
      if(!text.trim())return;
      rediHist.push({o:'me',t:text}); paint();
      rediHist.push({o:'redi',t:'…'}); paint();
      const ans=await REDI_API.preguntarARedi(text);
      rediHist[rediHist.length-1]={o:'redi',t:ans}; paint();
    };
    document.getElementById('rcSend').onclick=()=>ask(inp.value);
    inp.onkeydown=e=>{if(e.key==='Enter')ask(inp.value);};
    $view().querySelectorAll('.suggest .s').forEach(s=>s.onclick=()=>ask(s.textContent));
    inp.focus();
  };
  paint();
};

/* ================= THEME ================= */
document.getElementById('themeBtn').onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{localStorage.setItem('redi-theme',t);}catch(e){}
  document.getElementById('themeIcon').innerHTML = t==='light'
    ? '<circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.5 4.5l1.8 1.8M17.7 17.7l1.8 1.8M19.5 4.5l-1.8 1.8M6.3 17.7l-1.8 1.8"/>'
    : '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>';
}
(function(){ let t='dark'; try{t=localStorage.getItem('redi-theme')|| (matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');}catch(e){} setTheme(t); })();
